version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: super-price-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: superprices
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: super-price-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/superprices
      PORT: 3000
      NODE_ENV: production
      TZ: UTC
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
